<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Quadro de Comportamento - App Fullscreen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
html, body {
  margin:0; padding:0;
  height:100%; width:100%;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #3b82f6, #9333ea);
  display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start;
  color:white;
}

/* Estrelas gigantes */
.star {animation:pop .4s ease; font-size:5rem; margin:0 4px;}
@keyframes pop{0%{transform:scale(.3);opacity:0}80%{transform:scale(1.5)}100%{transform:scale(1);opacity:1}}

/* Barra de progresso gigante */
.progress-container {width:90%; height:40px; border-radius:20px; background-color:#e2e8f0; margin:16px 0;}
.progress-fill {height:100%; border-radius:20px; background-color:#34d399; transition:width 0.5s ease;}

/* Botões enormes */
button {font-size:2.5rem; padding:1rem 2rem; border-radius:1.5rem; margin:8px 0; cursor:pointer;}

/* Inputs gigantes */
input {font-size:2rem; padding:1rem; border-radius:1.5rem; width:100%; margin:8px 0; box-sizing:border-box;}

/* Confetti grande */
.confetti {position:absolute; pointer-events:none; width:20px; height:20px; border-radius:50%; animation:fall 1s linear forwards;}
@keyframes fall {0%{transform:translateY(0)}100%{transform:translateY(400px);opacity:0}}

/* Painel admin centralizado e responsivo */
#adminPanel {width:90%; max-width:400px; background:white; color:black; padding:32px; border-radius:3rem; margin-bottom:32px; box-sizing:border-box;}
#adminPanel input, #adminPanel button {width:100%;}
#controls button {margin-top:8px;}
</style>
</head>
<body>

<div style="text-align:center; width:100%;">
  <h1 style="font-size:5rem; margin:16px 0;">⭐ Quadro de Comportamento</h1>
  <p style="font-size:2.5rem; margin-bottom:32px;">Ganhem estrelas para merecer o passeio!</p>
</div>

<div style="flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:32px;">

  <!-- Criança 1 -->
  <div style="background:white; color:black; border-radius:3rem; width:90%; padding:32px; display:flex; flex-direction:column; align-items:center;">
    <h2 id="name1" style="font-size:4rem; font-weight:bold; margin-bottom:16px;">Criança 1</h2>
    <div id="stars1" style="display:flex; justify-content:center; gap:16px; font-size:5rem;"></div>
    <div class="progress-container">
      <div id="progress1" class="progress-fill" style="width:0%"></div>
    </div>
    <button onclick="addStar(1)" class="admin-only hidden" style="background:#10b981; color:white;">+ ⭐</button>
  </div>

  <!-- Criança 2 -->
  <div style="background:white; color:black; border-radius:3rem; width:90%; padding:32px; display:flex; flex-direction:column; align-items:center;">
    <h2 id="name2" style="font-size:4rem; font-weight:bold; margin-bottom:16px;">Criança 2</h2>
    <div id="stars2" style="display:flex; justify-content:center; gap:16px; font-size:5rem;"></div>
    <div class="progress-container">
      <div id="progress2" class="progress-fill" style="width:0%"></div>
    </div>
    <button onclick="addStar(2)" class="admin-only hidden" style="background:#10b981; color:white;">+ ⭐</button>
  </div>

</div>

<div id="reward" style="display:none; font-size:5rem; font-weight:bold; color:yellow; text-align:center; margin:32px 0;">🎉 Passeio desbloqueado!</div>

<button onclick="toggleAdmin()" style="font-size:2rem; color:white; text-decoration:underline; margin-bottom:16px;">Admin</button>

<div id="adminPanel" style="display:none;">
  <div id="loginArea">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="login()" style="background:#3b82f6; color:white;">Login</button>
  </div>

  <div id="controls" style="display:none;">
    <label style="font-size:2rem;">Nome Criança 1</label>
    <input id="child1Input" type="text">
    <label style="font-size:2rem;">Nome Criança 2</label>
    <input id="child2Input" type="text">
    <button onclick="updateNames()" style="background:#6366f1; color:white;">Atualizar nomes</button>
    <button onclick="removeStar(1)" style="background:#ef4444; color:white;">- ⭐ Criança 1</button>
    <button onclick="removeStar(2)" style="background:#ef4444; color:white;">- ⭐ Criança 2</button>
    <label style="font-size:2rem;">Estrelas para passeio</label>
    <input id="neededStars" type="number">
    <button onclick="updateGoal()" style="background:#8b5cf6; color:white;">Atualizar objetivo</button>
    <button onclick="resetBoard()" style="background:#b91c1c; color:white;">Reset semana</button>
    <button onclick="logout()" style="background:#4b5563; color:white;">Logout</button>
  </div>
</div>

<script>
let stars1, stars2, child1, child2, neededStars;
let isAdmin = false;
const ADMIN_PASSWORD = "1234";

async function loadData(){
  const res = await fetch("/data");
  const data = await res.json();
  stars1 = data.stars1;
  stars2 = data.stars2;
  child1 = data.child1;
  child2 = data.child2;
  neededStars = data.neededStars;
  document.getElementById("neededStars").value = neededStars;
  document.getElementById("child1Input").value = child1;
  document.getElementById("child2Input").value = child2;
  render();
}

async function saveData(){
  await fetch("/data",{method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({child1, child2, stars1, stars2, neededStars})});
}

function render(){
  document.getElementById("stars1").innerHTML="";
  document.getElementById("stars2").innerHTML="";
  for(let i=0;i<stars1;i++) document.getElementById("stars1").innerHTML+=`<span class="star">⭐</span>`;
  for(let i=0;i<stars2;i++) document.getElementById("stars2").innerHTML+=`<span class="star">⭐</span>`;
  document.getElementById("name1").innerText = child1;
  document.getElementById("name2").innerText = child2;
  document.getElementById("progress1").style.width = Math.min(100,(stars1/neededStars)*100)+"%";
  document.getElementById("progress2").style.width = Math.min(100,(stars2/neededStars)*100)+"%";
  if(stars1>=neededStars && stars2>=neededStars){
    document.getElementById("reward").style.display="block"; launchConfetti();
  } else {document.getElementById("reward").style.display="none";}
}

async function addStar(child){
  if(!isAdmin){alert("Apenas admin!"); return;}
  if(child===1 && stars1>=neededStars){alert(child1+" já atingiu o limite!"); return;}
  if(child===2 && stars2>=neededStars){alert(child2+" já atingiu o limite!"); return;}
  if(child===1) stars1++;
  if(child===2) stars2++;
  render(); await saveData();
}

async function removeStar(child){
  if(!isAdmin){alert("Apenas admin!"); return;}
  if(child===1 && stars1>0) stars1--;
  if(child===2 && stars2>0) stars2--;
  render(); await saveData();
}

async function updateNames(){child1=document.getElementById("child1Input").value; child2=document.getElementById("child2Input").value; render(); await saveData();}
async function updateGoal(){neededStars=Number(document.getElementById("neededStars").value); await saveData();}
async function resetBoard(){stars1=0; stars2=0; await saveData(); render();}

function toggleAdmin(){document.getElementById("adminPanel").style.display=document.getElementById("adminPanel").style.display==="none"?"block":"none";}
function login(){const pass=document.getElementById("adminPass").value; if(pass===ADMIN_PASSWORD){document.getElementById("loginArea").style.display="none"; document.getElementById("controls").style.display="block"; isAdmin=true; document.querySelectorAll(".admin-only").forEach(b=>b.style.display="block")} else alert("Password errada");}
function logout(){document.getElementById("controls").style.display="none"; document.getElementById("loginArea").style.display="block"; document.querySelectorAll(".admin-only").forEach(b=>b.style.display="none"); isAdmin=false; document.getElementById("adminPass").value="";}

function launchConfetti(){for(let i=0;i<50;i++){const c=document.createElement("div"); c.className="confetti"; c.style.left=Math.random()*window.innerWidth+"px"; c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`; document.body.appendChild(c); setTimeout(()=>c.remove(),1200)}}

loadData();
</script>
</body>
</html>
