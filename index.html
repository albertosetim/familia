<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Quadro de Comportamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star {
            animation: pop .4s ease
        }

        @keyframes pop {
            0% {
                transform: scale(.3);
                opacity: 0
            }

            80% {
                transform: scale(1.2)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        .reward {
            animation: bounce 1s infinite
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-200 to-purple-200 min-h-screen flex flex-col items-center p-8">

    <h1 class="text-4xl font-bold mb-6">⭐ Quadro de Comportamento</h1>
    <p class="mb-10 text-lg">Ganhem estrelas para merecer o passeio!</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-4xl">

        <div class="bg-white rounded-2xl shadow-xl p-6 text-center">
            <h2 id="name1" class="text-2xl font-bold mb-4">Criança 1</h2>
            <div id="stars1" class="flex justify-center gap-2 mb-6 text-3xl"></div>
            <button onclick="addStar(1)" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl">+
                ⭐</button>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 text-center">
            <h2 id="name2" class="text-2xl font-bold mb-4">Criança 2</h2>
            <div id="stars2" class="flex justify-center gap-2 mb-6 text-3xl"></div>
            <button onclick="addStar(2)" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl">+
                ⭐</button>
        </div>

    </div>

    <div id="reward" class="hidden mt-12 text-3xl font-bold text-yellow-600 reward">🎉 Passeio desbloqueado!</div>

    <button onclick="toggleAdmin()" class="mt-10 text-sm text-gray-600 underline">Admin</button>

    <div id="adminPanel" class="hidden mt-6 bg-white p-6 rounded-xl shadow w-80">
        <h3 class="text-xl font-bold mb-4">Admin</h3>

        <div id="loginArea">
            <input id="adminPass" type="password" placeholder="Password" class="border p-2 w-full mb-3 rounded">
            <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Login</button>
        </div>

        <div id="controls" class="hidden">
            <label class="text-sm">Nome Criança 1</label>
            <input id="child1Input" type="text" class="border p-2 w-full mb-3 rounded">

            <label class="text-sm">Nome Criança 2</label>
            <input id="child2Input" type="text" class="border p-2 w-full mb-3 rounded">

            <button onclick="updateNames()" class="bg-indigo-500 text-white px-4 py-2 rounded w-full mb-3">Atualizar
                nomes</button>

            <div class="flex justify-between mb-3">
                <button onclick="removeStar(1)" class="bg-red-400 text-white px-3 py-1 rounded">- ⭐ Criança 1</button>
                <button onclick="removeStar(2)" class="bg-red-400 text-white px-3 py-1 rounded">- ⭐ Criança 2</button>
            </div>

            <label class="text-sm">Estrelas para passeio</label>
            <input id="neededStars" type="number" class="border p-2 w-full mb-3 rounded">
            <button onclick="updateGoal()" class="bg-purple-500 text-white px-4 py-2 rounded w-full mb-3">Atualizar
                objetivo</button>

            <button onclick="resetBoard()" class="bg-red-600 text-white px-4 py-2 rounded w-full">Reset semana</button>
        </div>
    </div>

    <script>
        let stars1, stars2, child1, child2, neededStars

        async function loadData() {
            const res = await fetch("/data")
            const data = await res.json()
            stars1 = data.stars1
            stars2 = data.stars2
            child1 = data.child1
            child2 = data.child2
            neededStars = data.neededStars

            document.getElementById("neededStars").value = neededStars
            document.getElementById("child1Input").value = child1
            document.getElementById("child2Input").value = child2
            render()
        }

        async function saveData() {
            await fetch("/data", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ child1, child2, stars1, stars2, neededStars })
            })
        }

        function render() {
            document.getElementById("stars1").innerHTML = ""
            document.getElementById("stars2").innerHTML = ""
            for (let i = 0; i < stars1; i++) document.getElementById("stars1").innerHTML += `<span class="star">⭐</span>`
            for (let i = 0; i < stars2; i++) document.getElementById("stars2").innerHTML += `<span class="star">⭐</span>`
            document.getElementById("name1").innerText = child1
            document.getElementById("name2").innerText = child2
            if (stars1 >= neededStars && stars2 >= neededStars) {
                document.getElementById("reward").classList.remove("hidden")
            } else {
                document.getElementById("reward").classList.add("hidden")
            }
        }

        async function addStar(child) { if (child === 1) stars1++; if (child === 2) stars2++; render(); await saveData() }
        async function removeStar(child) { if (child === 1 && stars1 > 0) stars1--; if (child === 2 && stars2 > 0) stars2--; render(); await saveData() }
        async function updateNames() { child1 = document.getElementById("child1Input").value; child2 = document.getElementById("child2Input").value; render(); await saveData() }
        async function updateGoal() { neededStars = Number(document.getElementById("neededStars").value); await saveData() }
        async function resetBoard() { stars1 = 0; stars2 = 0; await saveData(); render() }

        const ADMIN_PASSWORD = "1234"
        function toggleAdmin() { document.getElementById("adminPanel").classList.toggle("hidden") }
        function login() { if (document.getElementById("adminPass").value === ADMIN_PASSWORD) { document.getElementById("loginArea").classList.add("hidden"); document.getElementById("controls").classList.remove("hidden") } else { alert("Password errada") } }

        loadData()
    </script>

</body>

</html>
