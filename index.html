<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Quadro de Comportamento</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Animação estrelas */
.star {animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.3);opacity:0}80%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* Barra de progresso */
#progress-bar {transition: width 0.5s ease;}

/* Confetti simples */
.confetti {
  position:absolute;
  pointer-events:none;
  width:10px;
  height:10px;
  background-color:yellow;
  animation:fall 1s linear forwards;
  border-radius:50%;
}
@keyframes fall {0%{transform:translateY(0)}100%{transform:translateY(300px);opacity:0}}
</style>
</head>
<body class="bg-gradient-to-br from-blue-200 to-purple-200 min-h-screen flex flex-col items-center p-4 sm:p-8 relative">

<h1 class="text-3xl sm:text-4xl font-bold mb-4 sm:mb-6 text-center">⭐ Quadro de Comportamento</h1>
<p class="mb-6 sm:mb-10 text-center text-lg">Ganhem estrelas para merecer o passeio!</p>

<div class="grid grid-cols-1 w-full max-w-4xl">

  <!-- Criança 1 -->
  <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6 text-center flex flex-col items-center">
    <h2 id="name1" class="text-2xl sm:text-2xl font-bold mb-3">Criança 1</h2>
    <div id="stars1" class="flex justify-center gap-1 sm:gap-2 mb-2 text-3xl"></div>
    <div class="w-full bg-gray-200 h-4 rounded mb-3">
      <div id="progress1" class="bg-green-500 h-4 rounded" style="width:0%"></div>
    </div>
    <button onclick="addStar(1)" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl admin-only hidden w-40 sm:w-48 mt-2">+ ⭐</button>
  </div>
</br>
  <!-- Criança 2 -->
  <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6 text-center flex flex-col items-center">
    <h2 id="name2" class="text-2xl sm:text-2xl font-bold mb-3">Criança 2</h2>
    <div id="stars2" class="flex justify-center gap-1 sm:gap-2 mb-2 text-3xl"></div>
    <div class="w-full bg-gray-200 h-4 rounded mb-3">
      <div id="progress2" class="bg-green-500 h-4 rounded" style="width:0%"></div>
    </div>
    <button onclick="addStar(2)" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl admin-only hidden w-40 sm:w-48 mt-2">+ ⭐</button>
  </div>

</div>

<div id="reward" class="hidden mt-8 sm:mt-12 text-3xl sm:text-4xl font-bold text-yellow-600 text-center">🎉 Passeio desbloqueado!</div>

<button onclick="toggleAdmin()" class="mt-6 text-sm text-gray-600 underline">Admin</button>

<div id="adminPanel" class="hidden mt-4 sm:mt-6 bg-white p-4 sm:p-6 rounded-xl shadow w-full sm:w-80 mx-auto">

  <h3 class="text-xl font-bold mb-3">Admin</h3>

  <div id="loginArea">
    <input id="adminPass" type="password" placeholder="Password" class="border p-2 w-full mb-3 rounded">
    <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Login</button>
  </div>

  <div id="controls" class="hidden">
    <label class="text-sm">Nome Criança 1</label>
    <input id="child1Input" type="text" class="border p-2 w-full mb-3 rounded">

    <label class="text-sm">Nome Criança 2</label>
    <input id="child2Input" type="text" class="border p-2 w-full mb-3 rounded">

    <button onclick="updateNames()" class="bg-indigo-500 text-white px-4 py-2 rounded w-full mb-3">Atualizar nomes</button>

    <div class="flex justify-between mb-3">
      <button onclick="removeStar(1)" class="bg-red-400 text-white px-3 py-1 rounded w-1/2 mr-2">- ⭐ Criança 1</button>
      <button onclick="removeStar(2)" class="bg-red-400 text-white px-3 py-1 rounded w-1/2 ml-2">- ⭐ Criança 2</button>
    </div>

    <label class="text-sm">Estrelas para passeio</label>
    <input id="neededStars" type="number" class="border p-2 w-full mb-3 rounded">
    <button onclick="updateGoal()" class="bg-purple-500 text-white px-4 py-2 rounded w-full mb-3">Atualizar objetivo</button>

    <button onclick="resetBoard()" class="bg-red-600 text-white px-4 py-2 rounded w-full mb-2">Reset semana</button>
    <button onclick="logout()" class="bg-gray-600 text-white px-4 py-2 rounded w-full">Logout</button>
  </div>
</div>

<script>
let stars1, stars2, child1, child2, neededStars
let isAdmin = false
const ADMIN_PASSWORD = "1234"

// --- Funções Backend ---
async function loadData(){
  const res = await fetch("/data")
  const data = await res.json()
  stars1 = data.stars1
  stars2 = data.stars2
  child1 = data.child1
  child2 = data.child2
  neededStars = data.neededStars

  document.getElementById("neededStars").value = neededStars
  document.getElementById("child1Input").value = child1
  document.getElementById("child2Input").value = child2
  render()
}

async function saveData(){
  await fetch("/data",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({child1, child2, stars1, stars2, neededStars})
  })
}

// --- Renderização ---
function render(){
  // Estrelas
  document.getElementById("stars1").innerHTML=""
  document.getElementById("stars2").innerHTML=""
  for(let i=0;i<stars1;i++) document.getElementById("stars1").innerHTML+=`<span class="star">⭐</span>`
  for(let i=0;i<stars2;i++) document.getElementById("stars2").innerHTML+=`<span class="star">⭐</span>`

  document.getElementById("name1").innerText = child1
  document.getElementById("name2").innerText = child2

  // Barra de progresso
  const p1 = Math.min(100,(stars1/neededStars)*100)
  const p2 = Math.min(100,(stars2/neededStars)*100)
  document.getElementById("progress1").style.width = p1+"%"
  document.getElementById("progress2").style.width = p2+"%"

  // Passeio desbloqueado
  if(stars1>=neededStars && stars2>=neededStars){
    document.getElementById("reward").classList.remove("hidden")
    launchConfetti()
  } else {
    document.getElementById("reward").classList.add("hidden")
  }
}

// --- Funções admin e estrelas ---
async function addStar(child){
  if(!isAdmin){alert("Apenas o admin pode adicionar estrelas!"); return}
  if(child === 1 && stars1 >= neededStars){ alert(child1 + " já atingiu o limite!"); return }
  if(child === 2 && stars2 >= neededStars){ alert(child2 + " já atingiu o limite!"); return }

  if(child===1) stars1++
  if(child===2) stars2++

  render()
  await saveData()
}

async function removeStar(child){
  if(!isAdmin){alert("Apenas o admin pode remover estrelas!"); return}
  if(child===1 && stars1>0) stars1--
  if(child===2 && stars2>0) stars2--
  render()
  await saveData()
}

async function updateNames(){
  child1 = document.getElementById("child1Input").value
  child2 = document.getElementById("child2Input").value
  render()
  await saveData()
}

async function updateGoal(){
  neededStars = Number(document.getElementById("neededStars").value)
  await saveData()
}

async function resetBoard(){
  stars1=0; stars2=0
  await saveData()
  render()
}

// --- Admin login/logout ---
function toggleAdmin(){document.getElementById("adminPanel").classList.toggle("hidden")}

function login(){
  const pass = document.getElementById("adminPass").value
  if(pass===ADMIN_PASSWORD){
    document.getElementById("loginArea").classList.add("hidden")
    document.getElementById("controls").classList.remove("hidden")
    isAdmin = true
    document.querySelectorAll(".admin-only").forEach(b=>b.classList.remove("hidden"))
  } else { alert("Password errada") }
}

function logout(){
  document.getElementById("controls").classList.add("hidden")
  document.getElementById("loginArea").classList.remove("hidden")
  document.querySelectorAll(".admin-only").forEach(b => b.classList.add("hidden"))
  isAdmin = false
  document.getElementById("adminPass").value=""
}

// --- Confetti ---
function launchConfetti(){
  for(let i=0;i<30;i++){
    const c=document.createElement("div")
    c.className="confetti"
    c.style.left=Math.random()*window.innerWidth+"px"
    c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`
    document.body.appendChild(c)
    setTimeout(()=>c.remove(),1000)
  }
}

// --- Inicialização ---
loadData()
</script>
</body>
</html>
